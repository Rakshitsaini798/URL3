<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Futuristic Chatbot</title>
    <!-- Google Fonts: Inter for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-glass: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --user-bubble: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --bot-bubble: rgba(51, 65, 85, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Main Container */
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            position: relative;
            margin: 20px;
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Header Area */
        header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        header span {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Chat History Area */
        #chat-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            padding-bottom: 40px;
            /* Space for typing indicator */
        }

        /* Custom Scrollbar */
        #chat-area::-webkit-scrollbar {
            width: 6px;
        }

        #chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: slideIn 0.3s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .bot-message {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
            border: 1px solid var(--glass-border);
            display: block;
        }

        /* Typing Indicator */
        .typing-indicator {
            align-self: flex-start;
            padding: 12px 18px;
            background: var(--bot-bubble);
            border-radius: 18px;
            display: none;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: dotFlashing 1s infinite alternate;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotFlashing {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* Input Area */
        .input-container {
            padding: 24px;
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input {
            flex: 1;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Error States */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            align-self: center;
            margin: 8px 0;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        @media (max-width: 640px) {
            .app-container {
                height: 100vh;
                border-radius: 0;
                margin: 0;
            }

            .message {
                max-width: 90%;
            }

            .btn span {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div class="status-dot"></div>
            <div>
                <h1>Nexus AI</h1>
                <span>GPT-3.5 Turbo Powered</span>
            </div>
        </header>

        <main id="chat-area">
            <div class="message bot-message">
                Hello! I am Nexus AI. How can I assist you today? You can ask me questions or request to generate an
                image.
            </div>
            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </main>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button class="btn btn-secondary" id="generate-image-btn" title="Generate an image based on prompt">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <span>Generate</span>
            </button>
            <button class="btn btn-primary" id="send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                <span>Send</span>
            </button>
        </div>
    </div>

    <script>
        /**
         * CONFIGURATION
         * Ensure your keys are correctly defined here.
         */
        const OPENROUTER_API_KEY = "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".trim();
        const HF_API_TOKEN = "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".trim();

        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const generateBtn = document.getElementById('generate-image-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // State to keep track of chat history for context (optional, but good practice)
        let conversationHistory = [];

        /**
         * UI HELPERS
         */

        /**
         * Escapes HTML characters to prevent XSS
         * @param {string} text 
         */
        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Appends a message bubble to the chat area
         * @param {'user'|'bot'} role 
         * @param {string} content 
         * @param {'text'|'image'} type 
         */
        function appendMessage(role, content, type = 'text') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;

            if (type === 'text') {
                // Using textContent is safer, but we'll use innerHTML with escape for flexibility
                messageDiv.textContent = content;
            } else if (type === 'image') {
                const img = document.createElement('img');
                img.src = content;
                img.className = 'message-image';
                img.alt = "AI Generated Image";
                img.onload = () => scrollToBottom();
                messageDiv.appendChild(img);
            }

            // Insert before typing indicator
            chatArea.insertBefore(messageDiv, typingIndicator);
            scrollToBottom();
        }

        /**
         * Smoothly scrolls chat to the bottom
         */
        function scrollToBottom() {
            chatArea.scrollTo({
                top: chatArea.scrollHeight,
                behavior: 'smooth'
            });
        }

        function showTyping(show) {
            typingIndicator.style.display = show ? 'flex' : 'none';
            scrollToBottom();
        }

        function showError(msg) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = `Error: ${msg}`;
            chatArea.insertBefore(errorDiv, typingIndicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        /**
         * API INTEGRATIONS
         */

        /**
         * Fetches a completion from OpenRouter with full conversation context
         * @param {string} text The latest user message
         */
        async function fetchChatResponse(text) {
            try {
                // Prepare message payload with context
                const messages = [
                    { "role": "system", "content": "You are Nexus AI, a helpful and futuristic AI assistant. IMPORTANT: You cannot generate images yourself. If a user asks for an image, tell them to click the 'Generate' button or use the /image command." },
                    ...conversationHistory,
                    { "role": "user", "content": text }
                ];

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, // Required by OpenRouter
                        "X-Title": "Nexus AI App"
                    },
                    body: JSON.stringify({
                        "model": "gpt-3.5-turbo",
                        "messages": messages
                    })
                });

                if (!response.ok) {
                    const errorDetail = await response.json().catch(() => ({}));
                    throw new Error(errorDetail.error?.message || `API Error: ${response.statusText}`);
                }

                const data = await response.json();
                const aiContent = data.choices[0].message.content;

                // Update internal history (keeping last 10 messages for context)
                conversationHistory.push({ "role": "user", "content": text });
                conversationHistory.push({ "role": "assistant", "content": aiContent });
                if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);

                return aiContent;
            } catch (err) {
                console.error("Chat API Error:", err);
                throw err;
            }
        }

        /**
         * Generates an image using Hugging Face Stable Diffusion
         * @param {string} prompt The image description
         */
        async function fetchImageGeneration(prompt) {
            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/runwayml/stable-diffusion-v1-5",
                    {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${HF_API_TOKEN}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            inputs: prompt,
                            options: { wait_for_model: true }
                        })
                    }
                );

                // 🔥 Show real error if any
                if (!response.ok) {
                    const text = await response.text();
                    console.error("HF ERROR:", text);
                    throw new Error(text);
                }

                const blob = await response.blob();
                return URL.createObjectURL(blob);

            } catch (err) {
                console.error("Image Generation Error:", err);
                throw err;
            }
        }
        /**
         * EVENT HANDLERS
         */

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // --- Broad Intent Detection Logic ---
            // If the input contains any of these keywords, assume it's an image request
            const lowerText = text.toLowerCase();
            const imageKeywords = ["image", "generate", "draw", "picture"];
            const isImageRequest = imageKeywords.some(kw => lowerText.includes(kw)) || lowerText.startsWith('/');

            if (isImageRequest) {
                // Switch to image mode directly
                return handleGenerateImage();
            }

            // 1. UI Update
            appendMessage('user', text);
            userInput.value = '';
            showTyping(true);
            sendBtn.disabled = true;
            generateBtn.disabled = true;

            try {
                // 2. API Call
                const response = await fetchChatResponse(text);

                // 3. Bot Response
                appendMessage('bot', response);
            } catch (err) {
                showError(err.message || 'Failed to get response from AI.');
            } finally {
                showTyping(false);
                sendBtn.disabled = false;
                generateBtn.disabled = false;
            }
        }

        async function handleGenerateImage() {
            const prompt = userInput.value.trim();
            if (!prompt) {
                alert("Please enter a prompt for the image!");
                return;
            }

            // 1. UI Update
            appendMessage('user', `Generating image: "${prompt}"`);
            userInput.value = '';
            showTyping(true);
            sendBtn.disabled = true;
            generateBtn.disabled = true;

            try {
                // 2. API Call
                const imageUrl = await fetchImageGeneration(prompt);

                // 3. Display Image
                appendMessage('bot', imageUrl, 'image');
            } catch (err) {
                showError(err.message || 'Failed to generate image.');
            } finally {
                showTyping(false);
                sendBtn.disabled = false;
                generateBtn.disabled = false;
            }
        }

        // Listeners
        sendBtn.addEventListener('click', handleSend);
        generateBtn.addEventListener('click', handleGenerateImage);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) handleSend();
        });

    </script>
</body>

</html>
